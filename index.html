<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>B2B in Germany · Strategic Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260413j">
</head>
<body>

  <header class="hud" id="hud">
    <div class="hud-chapter" id="hudChapter"></div>
    <div class="hud-end">
      <span class="hud-count" id="hudCount"></span>
      <button class="hud-btn hud-menu-btn" id="menuBtn" aria-label="Chapter navigation">
        <svg width="16" height="11" viewBox="0 0 16 11" fill="none">
          <path d="M0 1h16M0 5.5h16M0 10h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <aside class="chapter-nav" id="chapterNav">
    <div class="chapter-nav-list" id="chapterNavList"></div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <main class="deck" id="deck"></main>

  <footer class="controls">
    <button class="ctrl-btn" id="prevBtn" disabled aria-label="Previous slide">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 3.5L5 9L11 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ctrl-rail" id="ctrlRail">
      <div class="ctrl-rail-meta">
        <div class="ctrl-rail-count" id="ctrlChapterCount"></div>
      </div>
      <div class="ctrl-rail-list" id="ctrlChapterRail"></div>
    </div>
    <button class="ctrl-btn" id="nextBtn" aria-label="Next slide">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M7 3.5L13 9L7 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </footer>

  <script src="js/content.js?v=20260413a"></script>
  <script src="js/app.js?v=20260413g"></script>
</body>
</html>
